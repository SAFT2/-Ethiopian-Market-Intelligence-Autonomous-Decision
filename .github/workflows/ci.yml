name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-and-ml:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: market_intelligence
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d market_intelligence"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/market_intelligence
      CREATE_TABLES_ON_STARTUP: "false"
      ML_SERVICE_BASE_URL: http://localhost:8010
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run compile checks
        run: |
          python -m compileall src/backend src/ml_service src/decision_engine src/market_pipeline

      - name: Run migrations
        run: |
          cd src/backend
          alembic -c alembic.ini upgrade head

      - name: Run backend tests
        run: |
          python -m pytest src/backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
